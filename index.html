        // 初始化游戏
        function initGame() {
            currentScene = 0;
            gameState = {
                inventory: [],
                relationships: {
                    old_man: 0,
                    shopkeeper: 0,
                    guard: 0
                }
            };
            updateScene();
        }
        
        // 更新场景
        function updateScene() {
            const scene = scenes[currentScene];
            if (!scene) return;
            
            // 更新故事文本
            document.getElementById('story-text').innerHTML = scene.text;
            
            // 更新选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            scene.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option.text;
                button.onclick = () => handleOption(option);
                optionsContainer.appendChild(button);
            });
            
            // 更新进度
            const progress = Math.round((currentScene / scenes.length) * 100);
            document.getElementById('progress').textContent = `${progress}%`;
        }
        
        // 处理选项
        function handleOption(option) {
            // 应用效果
            if (option.effect) {
                if (option.effect.inventory) {
                    gameState.inventory = [...gameState.inventory, ...option.effect.inventory];
                }
                if (option.effect.relationship) {
                    for (const [key, value] of Object.entries(option.effect.relationship)) {
                        gameState.relationships[key] = (gameState.relationships[key] || 0) + value;
                    }
                }
            }
            
            // 检查是否游戏结束
            if (option.nextScene === 'game_over') {
                showGameOver(option.gameOverText);
                return;
            }
            
            // 切换到下一个场景
            currentScene = option.nextScene;
            updateScene();
        }
        
        // 显示游戏结束
        function showGameOver(text) {
            document.getElementById('game-over-text').textContent = text;
            document.getElementById('game-over').style.display = 'block';
            document.querySelector('.story-section').style.display = 'none';
        }
        
        // 重新开始游戏
        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            document.querySelector('.story-section').style.display = 'block';
            initGame();
        }
        
        // 启动游戏
        initGame();
    </script>
